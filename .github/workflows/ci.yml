name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-mirror/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/

  backend-test:
    name: Backend — tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: content_mirror_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: content-mirror/backend
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/content_mirror_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret
      APP_SECRET_KEY: ci-app-secret
      ANTHROPIC_API_KEY: dummy
      STORAGE_BACKEND: local
      LOCAL_UPLOAD_DIR: /tmp/uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-mirror/frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: content-mirror/frontend/package.json
      - run: npm install
      - run: npm run build

  frontend-lint:
    name: Frontend — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-mirror/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: content-mirror/frontend/package.json
      - run: npm install
      - run: npm run lint
